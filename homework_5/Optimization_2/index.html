<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Homework 5</title>
    <link rel="stylesheet" href="main.css">

    <style>
        .bg {
            background: #329696;
        }

        .h100 {
            height: 100px;
        }

        .display {
            display: flex;
        }

        .margin__t {
            margin-top: 1px;
        }

        .leveling {
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header bg display leveling">Header</div>
    <div class="bg h100 display margin__t leveling">Nav</div>
    <div class="display margin__t">
        <div class="main_left display leveling">Main</div>
        <div class="aside display leveling">Aside</div>
    </div>
    <div class="bg h100 display margin__t leveling">Footer</div>
</div>
</body>
</html>
